name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run verification suite (exits nonzero on any failed check)
        run: python verify.py
      - name: Reproduce paper numbers and tables
        run: python run_analysis.py
